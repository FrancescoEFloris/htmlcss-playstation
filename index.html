<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/utility.css">

    <title>Playstation Web</title>
</head>

<body>


    <!--  Header  -->
    <header class="bg-black text-end">
        <img class="logo-sony" src="img/sony_logo.svg" alt="Logo della sony">
    </header>

    <!--  Navbar  -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <img src="img/play_logo.svg" alt="">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>

                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <!--  Game Banner-1  -->
    <!--  Banner's BG  -->
    <div class="banner-gm-wrapper">
        <div class="banner-gm">
            <img src="img/jumbo-bg.png" alt="Banner del gioco returnal">
        </div>
    </div>
    <!--  Banner's text   -->

    <!--  Banner's alt games  -->
    <section class="">
        <div class="container">
            <div class="row row-cols-2">
                <div class="col"><img class="mt-4 game-img-top img-fluid w-100"
                        src="img/returnal-listing-thumb-01-ps5.jpg" alt=""></div>
                <div class="col"><img class="mt-4 game-img-top img-fluid w-100"
                        src="img/ratchet-and-clank-rift-apart-keyart.jpg" alt=""></div>
                <div class="col"><img class="mt-4 game-img-top img-fluid w-100"
                        src="img/returnal-listing-thumb-01-ps5.jpg" alt=""></div>
                <div class="col"><img class="mt-4 game-img-top img-fluid w-100"
                        src="img/ratchet-and-clank-rift-apart-keyart.jpg" alt=""></div>
                <div class="col"><img class="mt-4 game-img-top img-fluid w-100"
                        src="img/returnal-listing-thumb-01-ps5.jpg" alt=""></div>
                <div class="col"><img class="mt-4 game-img-top img-fluid w-100"
                        src="img/ratchet-and-clank-rift-apart-keyart.jpg" alt=""></div>
            </div>
        </div>
    </section>


    <!--  playstation 5 Console Banner -->
    <div class="m-2">
        <p class="ps-ref text-center m-0 mt-5">PLAY HAS NO LIMITS</p>
        <h2 class="ps-title text-center mb-3">Ecco la PlayStation 5</h2>
        <p class="ps-text text-center">Tuffati in nuove possibilità di gioco completamente inaspettate</p>
        <div class="container">
            <div class="row row-cols-lg-2">
                <div class="col-12">
                    <h2 class="ps-title mt-4 mb-3">Console PlayStation 5</h2>
                    <p class="ps-text">Sperimenta la nuova generazione di incredibili giochi playstation</p>
                    <button class="ps-btn-util bg-blue text-white">Maggiori informazioni</button>
                </div>
                <div class="col-12"><img class="img-fluid w-100" src="img/playstation-5-thumb.png" alt=""></div>
            </div>
            <div class="row row-cols-lg-5">
                <div class="col-4"><img class="img-fluid w-100 ps5-img" src="img/playstation-5-thumb.png" alt="">
                </div>
                <div class="col-4"><img class="img-fluid w-100 ps5-img" src="img/joypad-thumb.png" alt=""></div>
                <div class="col-4"><img class="img-fluid w-100 ps5-img" src="img/headset-thumb.png" alt=""></div>
                <div class="col-4"><img class="img-fluid w-100 ps5-img" src="img/remote-thumb.png" alt=""></div>
                <div class="col-4"><img class="img-fluid w-100 ps5-img" src="img/camera-thumb.jpg" alt=""></div>
            </div>

        </div>

    </div>

    <!--  Game Banner-2  -->
    <div class="banner-gm-wrapper">
        <div class="banner-gm">
            <img src="img/it-takes-two-hero-banner-desktop.jpg" alt="Banner del gioco returnal">
        </div>
    </div>
