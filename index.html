<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/utility.css">

    <title>Playstation Web</title>
</head>

<body>
    <!--  black bar header  -->
    <header class="bg-black text-end">
        <img class="logo-sony" src="img/sony_logo.svg" alt="Logo della sony">
    </header>
    <!--  navbar  -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <img src="img/play_logo.svg" alt="">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>

                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <!--  banner 1  -->
    <div class="main-banner-wrapper">
        <div class="main-banner">
            <img src="img/jumbo-bg.png" alt="Banner del gioco returnal">
        </div>
    
    <!--  game section 1  -->
        <section class="">
            <div class="container">
                <div class="row row-cols-2">
                    <div class="col"><img class="mt-4 game-img-top img-fluid w-100" src="img/returnal-listing-thumb-01-ps5.jpg" alt=""></div>
                    <div class="col"><img class="mt-4 game-img-top img-fluid w-100" src="img/ratchet-and-clank-rift-apart-keyart.jpg" alt=""></div>
                    <div class="col"><img class="mt-4 game-img-top img-fluid w-100" src="img/returnal-listing-thumb-01-ps5.jpg" alt=""></div>
                    <div class="col"><img class="mt-4 game-img-top img-fluid w-100" src="img/ratchet-and-clank-rift-apart-keyart.jpg" alt=""></div>
                    <div class="col"><img class="mt-4 game-img-top img-fluid w-100" src="img/returnal-listing-thumb-01-ps5.jpg" alt=""></div>
                    <div class="col"><img class="mt-4 game-img-top img-fluid w-100" src="img/ratchet-and-clank-rift-apart-keyart.jpg" alt=""></div>
                </div>
            </div>
        </section>
    </div>


    <!--  Jscipt  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
